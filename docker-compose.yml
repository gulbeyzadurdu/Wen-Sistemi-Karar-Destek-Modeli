services:
  timescale:
    image: timescale/timescaledb:latest-pg15
    container_name: wen-timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wen_dev}
      POSTGRES_DB: ${POSTGRES_DB:-wen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wen} -d ${POSTGRES_DB:-wen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wen-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: wen-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

volumes:
  timescale_data:
  redis_data:
  mosquitto_data:
